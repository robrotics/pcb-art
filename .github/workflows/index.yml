name: gallery index

on:
  pull_request:
    paths: ['art/**', 'scripts/**']
  push:
    branches: [main]
    paths: ['art/**', 'scripts/**']

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build-index.js --check

  regenerate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # build-index reads git history for piece "added" dates
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build-index.js
      - name: commit index.json + footprint library if they changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json robrotics-art.pretty
          git diff --cached --quiet || (git commit -m "regenerate index.json + robrotics-art.pretty" && git push)
